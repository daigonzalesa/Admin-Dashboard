<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaiDashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <Header class="header">Header
        </Header>
        <aside class="sidebar">
            <nav>
                <ul>
                    <div class="Dashboard icons">
                        <li>
                            <img class="Dash-icon" src="icons/nature-people.svg">
                            <span>Dashboard</span>
                        </li>
                    </div>

                    <div class="Home icons">
                        <li>
                            <img class="nav-icon" src="icons/bee-flower.svg">
                            <span>Home</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/butterfly.svg">
                            <span>My profile</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/paw.svg">
                            <span>Sami's profile</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/calendar-heart-outline.svg">
                            <span>My wedding</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/flower-tulip.svg">
                            <span>Tasks</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/flower-poppy.svg">
                            <span>Community</span>
                        </li>
                    </div>

                    <div class="Setting icons">
                        <li>
                            <img class="nav-icon" src="icons/rabbit-variant.svg">
                            <span>Settings</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/jellyfish.svg">
                            <span>Support</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/spider-thread.svg">
                            <span>Privacy</span>
                        </li>
                        <li>
                            <img class="nav-icon" src="icons/leaf-circle.svg">
                            <span>Log out</span>
                        </li>
                    </div>
                </ul>
            </nav>
        </aside>
        <main class="content">Content
        </main>
    </div>
</body> 
</html>
